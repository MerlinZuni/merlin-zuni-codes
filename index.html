<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Merlin Zuni Codes</title>
    <style>
        /* ── Local font: TBJ Interval ────────────────────────────── */
        @font-face {
            font-family: 'TBJInterval';
            src: url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Bold.woff2') format('woff2'),
                 url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Bold.woff') format('woff'),
                 url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'TBJInterval';
            src: url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Light.woff2') format('woff2'),
                 url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Light.woff') format('woff'),
                 url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Light.ttf') format('truetype');
            font-weight: 300;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'TBJInterval';
            src: url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Regular.woff2') format('woff2'),
                 url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Regular.woff') format('woff'),
                 url('fonts/interval-modern-grid-perfect-monospace-2026-03-23-03-41-07-utc/WOFF/TBJInterval-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        /* ── Glass CSS variables ─────────────────────────────────── */
        :root {
            --glass-blur:       6px;
            --glass-tint:       0.005;
            --glass-brightness: 0.81;
            --glass-saturate:   0.75;
        }

        /* ── Reset ───────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            background: #050505;
            overflow-x: hidden;
        }

        /* ── Fixed background image ──────────────────────────────── */
        #bg-image {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background-image: url('assets/background-code-color-wave.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            pointer-events: none;
        }

        /* ── Fixed header — title + subtitle stay in place ───────── */
        .page-header {
            position: fixed;
            left: clamp(2rem, 8vw, 7rem);
            top: clamp(2rem, 6vh, 4.5rem);  /* near the top with breathing room */
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 5;
            pointer-events: none;
        }

        /* ── Title ───────────────────────────────────────────────── */
        h1 {
            font-family: 'TBJInterval', monospace;
            font-weight: 700;
            /* grows with viewport but caps early — stops overlap at large sizes */
            font-size: clamp(3.5rem, 7vw, 5.6rem);
            text-transform: uppercase;
            color: #ffffff;
            letter-spacing: 0.04em;
            line-height: 0.93;          /* tight — uppercase has no descenders */
            text-align: left;
            margin-bottom: 0.35em;
            text-shadow: 0 0 80px rgba(255,255,255,0.12);
        }

        /* ── Subtitle ────────────────────────────────────────────── */
        .subtitle {
            font-family: 'TBJInterval', monospace;
            font-weight: 300;
            font-size: clamp(1rem, 1.8vw, 1.3rem);
            color: #f04438;
            mix-blend-mode: difference;
            letter-spacing: 0.22em;
            line-height: 1.1;
            text-transform: uppercase;
            text-align: left;
        }

        /* ── Scrollable section — links scroll OVER the header ───── */
        /* z-index: 20 → liquidGL renderer auto-sets to 19, text at 20 */
        .scroll-main {
            position: relative;
            z-index: 20;
            min-height: 180vh;      /* enough room to scroll */
            padding-top: 65vh;      /* links start in the lower viewport */
            padding-left: clamp(2rem, 8vw, 7rem);
            padding-right: clamp(2rem, 5vw, 5rem);
            padding-bottom: 20vh;
        }

        /* ── Nav — indented to ~1/3 on desktop ───────────────────── */
        nav {
            margin-left: clamp(0px, calc(33vw - clamp(2rem, 8vw, 7rem)), 28rem);
        }

        nav ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0;
            align-items: flex-start;
        }

        nav ul li a {
            text-decoration: none;
            display: block;
        }

        /* ── Menu link — CSS backdrop-filter glass ───────────────── */
        .menu {
            font-family: 'TBJInterval', monospace;
            font-weight: 400;
            font-size: clamp(1.76rem, 4.48vw, 2.48rem);
            text-transform: uppercase;
            letter-spacing: 0;
            color: rgba(255,255,255,0.75);
            padding: 0;
            border-top:  1px solid rgba(255,255,255,0.18);
            border-left: 1px solid rgba(255,255,255,0.18);
            border-right: none;
            border-bottom: none;
            border-radius: 0;
            background: rgba(255,255,255,var(--glass-tint));
            backdrop-filter:         blur(var(--glass-blur)) brightness(var(--glass-brightness)) saturate(var(--glass-saturate));
            -webkit-backdrop-filter: blur(var(--glass-blur)) brightness(var(--glass-brightness)) saturate(var(--glass-saturate));
            position: relative;
            display: inline-block;
            white-space: nowrap;
            transition: color 0.22s ease,
                        background 0.22s ease,
                        backdrop-filter 0.22s ease;
        }

        .menu:hover {
            --glass-tint: 0.07;
        }

        nav ul li:last-child .menu {
            border-bottom: 1px solid rgba(255,255,255,0.18);
        }

        .menu:hover { color: #ffffff; }

        /* ── Menu inner — text layer ─────────────────────────────── */
        .menu-inner {
            display: inline-flex;
            align-items: stretch;
            position: relative;
            z-index: 1;
        }

        /* ── Character cells ─────────────────────────────────────── */
        .char-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.42em 0;
            border-right: 1px solid rgba(255,255,255,0.18);
            flex-shrink: 0;
            line-height: 1;
        }

        /* ── Bracket cells — hidden until hover ─────────────────── */
        .bracket-cell {
            width: 0;
            overflow: hidden;
            color: #f04438;
            border-right-width: 0;
            transition: width 0.22s ease, border-right-width 0s 0.11s;
        }

        /* On hover, expand to one char-cell width (set per row in JS) */
        .menu:hover .bracket-cell {
            width: var(--cell-w);
            border-right-width: 1px;
            transition: width 0.22s ease;
        }

        /* ── Responsive ──────────────────────────────────────────── */
        @media (max-width: 960px) {
            nav { margin-left: 0; }
            .menu { font-size: clamp(1.3rem, 3.6vw, 2.48rem); }
        }

        @media (max-width: 600px) {
            .page-header {
                height: auto;
                top: 2.5rem;
                justify-content: flex-start;
            }
            .scroll-main {
                padding-top: 52vh;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
            h1 { font-size: clamp(2.4rem, 9vw, 3.5rem); text-align: left; }
            .subtitle { font-size: clamp(0.8rem, 3vw, 1rem); text-align: left; }
            nav {
                margin-left: 0;
                max-width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            .menu { font-size: clamp(0.95rem, 4.2vw, 1.5rem); }
        }
    </style>
</head>

<body>
    <div id="bg-image" aria-hidden="true"></div>

    <!-- Fixed title + subtitle -->
    <header class="page-header">
        <h1>Merlin<br>Zuni<br>Codes</h1>
        <p class="subtitle">experiments in code &amp; motion</p>
    </header>

    <!-- Scrollable project links — scroll over the fixed header -->
    <main class="scroll-main">
        <nav>
            <ul>
                <li><a href="clock-experiment.html"><div class="menu"><div class="menu-inner">The rotating clock</div></div></a></li>
                <li><a href="molnar-boxes.html"><div class="menu"><div class="menu-inner">Molnar Boxes</div></div></a></li>
                <li><a href="particle-waves.html"><div class="menu"><div class="menu-inner">Particle waves</div></div></a></li>
                <li><a href="moving-waves.html"><div class="menu"><div class="menu-inner">Moving waves</div></div></a></li>
                <li><a href="moving-grid.html"><div class="menu"><div class="menu-inner">Moving grid</div></div></a></li>
            </ul>
        </nav>
    </main>

    <!-- Character-cell builder — targets .menu-inner -->
    <script>
    (function () {
        const ruler = document.createElement('canvas').getContext('2d');

        window.buildCells = function buildCells() {
            document.querySelectorAll('.menu-inner').forEach(el => {
                if (!el.dataset.origText) el.dataset.origText = el.textContent.trim();
                const text = el.dataset.origText;
                const cs         = window.getComputedStyle(el.closest('.menu') || el);
                const fontSize   = parseFloat(cs.fontSize);
                const fontWeight = cs.fontWeight;
                const fontFamily = cs.fontFamily;
                ruler.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
                const charW = ruler.measureText('M').width;
                const cellW = Math.round(charW + fontSize * 0.28);

                el.style.setProperty('--cell-w', cellW + 'px');

                const cells = [...text].map(ch =>
                    `<span class="char-cell" style="width:${cellW}px">${ch === ' ' ? '' : ch}</span>`
                ).join('');

                el.innerHTML =
                    `<span class="char-cell bracket-cell bracket-open">{</span>` +
                    cells +
                    `<span class="char-cell bracket-cell bracket-close">}</span>`;
            });
        };

        document.fonts.ready.then(window.buildCells);

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(window.buildCells, 120);
        });
    })();
    </script>
</body>
</html>
